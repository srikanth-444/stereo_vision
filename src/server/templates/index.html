<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PerceptionLab Dashboard</title>

  <!-- Socket.IO client -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ──────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.2rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; color: #58a6ff; letter-spacing: 0.05em; }
    #connection-badge {
      padding: 0.2rem 0.7rem;
      border-radius: 12px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #da3633;
      color: #fff;
      transition: background 0.3s;
    }
    #connection-badge.connected { background: #238636; }

    /* ── Control bar ──────────────────────────────────────────────── */
    .control-bar {
      display: flex;
      gap: 0.6rem;
      padding: 0.4rem 1.2rem;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .btn {
      padding: 0.3rem 0.9rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.15s;
    }
    .btn:hover { background: #30363d; }
    .btn.danger { border-color: #da3633; color: #f85149; }
    .btn.danger:hover { background: #da3633; color: #fff; }

    /* ── Main layout ──────────────────────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 220px;
      gap: 0.5rem;
      padding: 0.5rem;
      flex: 1;
      overflow: hidden;
    }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      padding: 0.3rem 0.8rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    /* ── Camera panel ─────────────────────────────────────────────── */
    #camera-panel { grid-column: 1; grid-row: 1; }
    #camera-img {
      flex: 1;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* ── 3-D Point cloud panel ────────────────────────────────────── */
    #cloud-panel { grid-column: 2; grid-row: 1; }
    #cloud-canvas {
      flex: 1;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    /* ── Stats + Logs row ─────────────────────────────────────────── */
    #stats-panel { grid-column: 1; grid-row: 2; }
    #log-panel   { grid-column: 2; grid-row: 2; }

    /* ── Stats grid ───────────────────────────────────────────────── */
    #stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.4rem;
      padding: 0.4rem 0.6rem;
      flex: 1;
    }
    .stat-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .stat-label { font-size: 0.68rem; color: #8b949e; margin-bottom: 0.1rem; }
    .stat-value { font-size: 1.4rem; font-weight: 700; color: #58a6ff; }

    /* ── Logs ──────────────────────────────────────────────────────── */
    #log-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0.6rem;
      font-size: 0.72rem;
      font-family: "Cascadia Code", "Fira Code", monospace;
    }
    .log-entry { padding: 0.1rem 0; border-bottom: 1px solid #21262d; }
    .log-entry .ts  { color: #8b949e; margin-right: 0.4em; }
    .log-entry .lvl { margin-right: 0.4em; font-weight: 600; }
    .log-entry.DEBUG .lvl { color: #8b949e; }
    .log-entry.INFO  .lvl { color: #58a6ff; }
    .log-entry.WARNING .lvl { color: #d29922; }
    .log-entry.ERROR, .log-entry.CRITICAL { .lvl { color: #f85149; } }
    .log-entry.ERROR   .lvl { color: #f85149; }
    .log-entry.CRITICAL .lvl { color: #f85149; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>
  <header>
    <h1>🔬 PerceptionLab Dashboard</h1>
    <span id="connection-badge">Disconnected</span>
  </header>

  <div class="control-bar">
    <button class="btn" onclick="sendCmd('start_tracking')">▶ Start Tracking</button>
    <button class="btn" onclick="sendCmd('stop_tracking')">⏹ Stop Tracking</button>
    <button class="btn danger" onclick="sendCmd('reset_map')">⚠ Reset Map</button>
    <button class="btn" onclick="clearLogs()">Clear Logs</button>
  </div>

  <main>
    <!-- Camera feed -->
    <div class="panel" id="camera-panel">
      <div class="panel-title">Camera Feed</div>
      <img id="camera-img" alt="Waiting for frame..." />
    </div>

    <!-- 3-D point cloud -->
    <div class="panel" id="cloud-panel">
      <div class="panel-title">3-D Point Cloud &amp; Trajectory</div>
      <canvas id="cloud-canvas"></canvas>
    </div>

    <!-- Stats -->
    <div class="panel" id="stats-panel">
      <div class="panel-title">System Status</div>
      <div id="stats-grid">
        <div class="stat-card"><div class="stat-label">FPS</div><div class="stat-value" id="s-fps">—</div></div>
        <div class="stat-card"><div class="stat-label">Frame ID</div><div class="stat-value" id="s-fid">—</div></div>
        <div class="stat-card"><div class="stat-label">Tracked Points</div><div class="stat-value" id="s-tracked">—</div></div>
        <div class="stat-card"><div class="stat-label">Visible Landmarks</div><div class="stat-value" id="s-visible">—</div></div>
        <div class="stat-card"><div class="stat-label">Keyframes</div><div class="stat-value" id="s-kf">—</div></div>
        <div class="stat-card"><div class="stat-label">Cloud Points</div><div class="stat-value" id="s-cloud">—</div></div>
      </div>
    </div>

    <!-- Logs -->
    <div class="panel" id="log-panel">
      <div class="panel-title">Logs</div>
      <div id="log-list"></div>
    </div>
  </main>

  <!-- ── Socket.IO, camera feed and logs (regular script) ──────────────── -->
  <script>
  const socket = io();
  window.socket = socket;   // expose for the ES module below
  const badge  = document.getElementById("connection-badge");

  socket.on("connect",    () => { badge.textContent = "Connected";    badge.className = "connected"; });
  socket.on("disconnect", () => { badge.textContent = "Disconnected"; badge.className = ""; });

  function sendCmd(action) {
    socket.emit("command", { action });
  }

  // ── Camera feed ─────────────────────────────────────────────────────────
  const camImg = document.getElementById("camera-img");

  socket.on("frame_update", (data) => {
    if (data.image) camImg.src = data.image;
    document.getElementById("s-fps").textContent     = data.fps        ?? "—";
    document.getElementById("s-fid").textContent     = data.frame_id   ?? "—";
    document.getElementById("s-tracked").textContent = data.n_tracked  ?? "—";
    document.getElementById("s-visible").textContent = data.n_visible  ?? "—";
    document.getElementById("s-kf").textContent      = data.n_keyframes ?? "—";
  });

  // ── Logs ────────────────────────────────────────────────────────────────
  const logList = document.getElementById("log-list");
  const MAX_LOG_ENTRIES = 200;

  socket.on("log_message", (entry) => {
    const div = document.createElement("div");
    div.className = `log-entry ${entry.level}`;
    div.innerHTML  = `<span class="ts">${entry.timestamp}</span>`
                   + `<span class="lvl">[${entry.level}]</span>`
                   + `<span class="name">${entry.name}: </span>`
                   + escHtml(entry.message);
    logList.appendChild(div);
    while (logList.children.length > MAX_LOG_ENTRIES) {
      logList.removeChild(logList.firstChild);
    }
    logList.scrollTop = logList.scrollHeight;
  });

  function clearLogs() { logList.innerHTML = ""; }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }
  </script>

  <!-- ── Three.js 3-D viewer (ES module) ────────────────────────────────── -->
  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  const socket = window.socket;

  (function () {
    const canvas = document.getElementById("cloud-canvas");
    const panel  = document.getElementById("cloud-panel");

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: false });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 1);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, 1, 0.01, 1000);
    camera.position.set(0, -5, 10);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;

    // Axis helper
    scene.add(new THREE.AxesHelper(1));

    // ── Point cloud geometry (all accumulated landmarks) ──
    const maxPts = 500_000;
    const posArr = new Float32Array(maxPts * 3);
    const colArr = new Float32Array(maxPts * 3);

    const geom = new THREE.BufferGeometry();
    geom.setAttribute("position", new THREE.BufferAttribute(posArr, 3));
    geom.setAttribute("color",    new THREE.BufferAttribute(colArr, 3));
    geom.setDrawRange(0, 0);

    const mat  = new THREE.PointsMaterial({ size: 0.03, vertexColors: true });
    const cloud = new THREE.Points(geom, mat);
    scene.add(cloud);

    // ── Active (latest keyframe) landmarks ──
    const activeGeo = new THREE.BufferGeometry();
    const activeMat = new THREE.PointsMaterial({ size: 0.06, color: 0xff2222 });
    const activeCloud = new THREE.Points(activeGeo, activeMat);
    scene.add(activeCloud);

    // ── Trajectory line ──
    const trajMat  = new THREE.LineBasicMaterial({ color: 0x58a6ff });
    const trajGeo  = new THREE.BufferGeometry();
    const trajLine = new THREE.Line(trajGeo, trajMat);
    scene.add(trajLine);

    let totalPts = 0;

    socket.on("pointcloud_update", (data) => {
      // Accumulated landmarks
      const lms = data.landmarks || [];
      const n   = Math.min(lms.length, maxPts);
      for (let i = 0; i < n; i++) {
        posArr[i * 3]     = lms[i][0];
        posArr[i * 3 + 1] = lms[i][1];
        posArr[i * 3 + 2] = lms[i][2];
        colArr[i * 3]     = 0.7; // grey-ish white
        colArr[i * 3 + 1] = 0.7;
        colArr[i * 3 + 2] = 0.7;
      }
      totalPts = n;
      geom.attributes.position.needsUpdate = true;
      geom.attributes.color.needsUpdate    = true;
      geom.setDrawRange(0, totalPts);
      geom.computeBoundingSphere();
      document.getElementById("s-cloud").textContent = totalPts;

      // Active landmarks
      const active = data.active || [];
      if (active.length > 0) {
        const aBuf = new Float32Array(active.length * 3);
        for (let i = 0; i < active.length; i++) {
          aBuf[i * 3]     = active[i][0];
          aBuf[i * 3 + 1] = active[i][1];
          aBuf[i * 3 + 2] = active[i][2];
        }
        activeGeo.setAttribute("position", new THREE.BufferAttribute(aBuf, 3));
        activeGeo.computeBoundingSphere();
      }

      // Trajectory
      const traj = data.trajectory || [];
      if (traj.length > 1) {
        const tBuf = new Float32Array(traj.length * 3);
        for (let i = 0; i < traj.length; i++) {
          tBuf[i * 3]     = traj[i][0];
          tBuf[i * 3 + 1] = traj[i][1];
          tBuf[i * 3 + 2] = traj[i][2];
        }
        trajGeo.setAttribute("position", new THREE.BufferAttribute(tBuf, 3));
      }
    });

    // ── Resize observer ──
    function resize() {
      const w = panel.clientWidth;
      const h = panel.clientHeight - 28; // subtract title bar
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(panel);
    resize();

    // ── Animation loop ──
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  })();
  </script>
</body>
</html>
